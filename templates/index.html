<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertisseur de Musique</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: #2d3748;
        }

        .container {
            background: var(--glass-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 2rem;
            font-size: 2rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-convert {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-convert:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .supported-platforms {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .platform-badge {
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-youtube {
            background: #ffebee;
            color: #c62828;
        }

        .badge-soundcloud {
            background: #fff3e0;
            color: #ef6c00;
        }

        .badge-spotify {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-instagram {
            background: #fce4ec;
            color: #c2185b;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status.success {
            background: #c6f6d5;
            color: #2f855a;
            border: 1px solid #9ae6b4;
        }

        .status.error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .download-link:hover {
            background: #764ba2;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section.active {
            display: block;
        }

        .info-text {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 10px;
            text-align: center;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 0.95rem;
            color: #4a5568;
        }

        /* Find Results */
        .find-results {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .result-cover {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
        }

        .result-info {
            flex: 1;
        }

        .result-title {
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .result-artist {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .result-links {
            display: flex;
            gap: 10px;
        }

        .link-icon {
            text-decoration: none;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .link-icon:hover {
            transform: scale(1.2);
        }

        .timecode-badge {
            background: #edf2f7;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #4a5568;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Convertisseur & Identificateur</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('convert')">Convertisseur</button>
            <button class="tab-btn" onclick="switchTab('find')">Identifier une musique</button>
        </div>

        <div id="convert-section" class="section active">
            <div class="info-text">
                Téléchargez de la musique depuis YouTube, SoundCloud, Spotify ou Instagram.
            </div>

            <div class="supported-platforms">
                <span class="platform-badge badge-youtube">YouTube</span>
                <span class="platform-badge badge-soundcloud">SoundCloud</span>
                <span class="platform-badge badge-spotify">Spotify</span>
                <span class="platform-badge badge-instagram">Instagram</span>
            </div>

            <div class="search-container">
                <div class="input-group">
                    <input type="text" id="urlInput" class="search-input" placeholder="Collez l'URL ici...">
                </div>
                <div class="input-group">
                    <input type="text" id="fileNameInput" class="search-input" placeholder="Nom du fichier (optionnel)">
                </div>
                <button onclick="convertUrl()" id="convertBtn" class="btn-convert">Convertir en MP3</button>
            </div>
        </div>

        <div id="find-section" class="section">
            <div class="info-text">
                Identifiez une musique à partir d'une URL (YouTube, SoundCloud, etc.)
            </div>

            <div class="search-container">
                <div class="input-group">
                    <input type="text" id="findUrlInput" class="search-input"
                        placeholder="URL de la vidéo/audio à analyser...">
                </div>
                <div class="input-group">
                    <input type="text" id="timecodesInput" class="search-input"
                        placeholder="Timecodes (ex: 30,60,90) - Optionnel">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="downloadFound">
                    <label for="downloadFound">Télécharger la musique si trouvée</label>
                </div>

                <button onclick="findMusic()" id="findBtn" class="btn-convert">Rechercher</button>
            </div>

            <div id="find-results" class="find-results"></div>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        function switchTab(tabName) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update sections
            document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
            document.getElementById(`${tabName}-section`).classList.add('active');

            // Clear status
            document.getElementById('status').style.display = 'none';
        }

        async function findMusic() {
            const urlInput = document.getElementById('findUrlInput');
            const timecodesInput = document.getElementById('timecodesInput');
            const downloadCheckbox = document.getElementById('downloadFound');
            const findBtn = document.getElementById('findBtn');
            const resultsDiv = document.getElementById('find-results');

            const url = urlInput.value.trim();
            const timecodes = timecodesInput.value.trim();
            const doDownload = downloadCheckbox.checked;

            if (!url) {
                showStatus('Veuillez entrer une URL', 'error');
                return;
            }

            // Reset UI
            resultsDiv.innerHTML = '';
            findBtn.disabled = true;
            findBtn.textContent = 'Recherche en cours...';
            showStatus('Analyse de l\'audio et recherche en cours...', 'loading');

            try {
                const response = await fetch('/find', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: url,
                        timecodes: timecodes,
                        download: doDownload
                    })
                });

                const data = await response.json();

                if (response.ok && data.success && data.progress_id) {
                    trackProgress(data.progress_id, 'find');
                } else {
                    showStatus(`❌ Erreur: ${data.error || 'Erreur inconnue'}`, 'error');
                    findBtn.disabled = false;
                    findBtn.textContent = 'Rechercher';
                }
            } catch (error) {
                showStatus(`❌ Erreur: ${error.message}`, 'error');
                findBtn.disabled = false;
                findBtn.textContent = 'Rechercher';
            }
        }

        async function convertUrl() {
            const urlInput = document.getElementById('urlInput');
            const fileNameInput = document.getElementById('fileNameInput');
            const convertBtn = document.getElementById('convertBtn');
            const url = urlInput.value.trim();
            const fileName = fileNameInput.value.trim();

            if (!url) {
                showStatus('Veuillez entrer une URL', 'error');
                return;
            }

            // Désactiver le bouton et afficher le chargement
            convertBtn.disabled = true;
            convertBtn.textContent = 'Conversion en cours...';
            showStatus('Analyse du lien et conversion en cours... (FFmpeg sera téléchargé automatiquement si nécessaire)', 'loading');

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: url,
                        source_type: 'auto', // On laisse le backend décider
                        filename: fileName || null
                    })
                });

                const data = await response.json();

                if (response.ok && data.success && data.progress_id) {
                    // Utiliser Server-Sent Events pour suivre la progression
                    trackProgress(data.progress_id, 'convert');
                } else {
                    let errorMsg = data.error || 'Erreur inconnue';
                    if (errorMsg.includes('FFmpeg') && errorMsg.includes('téléchargement')) {
                        errorMsg = '⏳ FFmpeg est en cours de téléchargement automatique. Cela peut prendre quelques minutes. Veuillez réessayer dans quelques instants.';
                        showStatus(errorMsg, 'loading');
                    } else {
                        showStatus(`❌ Erreur: ${errorMsg}`, 'error');
                    }
                    convertBtn.disabled = false;
                    convertBtn.textContent = 'Convertir en MP3';
                }
            } catch (error) {
                showStatus(`❌ Erreur: ${error.message}`, 'error');
                convertBtn.disabled = false;
                convertBtn.textContent = 'Convertir en MP3';
            }
        }

        function trackProgress(progressId, type = 'convert') {
            const eventSource = new EventSource(`/progress/${progressId}`);
            let lastReceivedStatus = null;
            let checkInterval = null;

            // Fallback: vérifier périodiquement si la conversion est terminée
            const checkCompletion = async function () {
                try {
                    const response = await fetch(`/check-progress/${progressId}`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.status === 'completed' || data.status === 'error' || data.status === 'completed_find') {
                            handleProgressUpdate(data);
                            if (checkInterval) clearInterval(checkInterval);
                        } else if (data.status === 'downloading' || data.status === 'converting' || data.status === 'analyzing') {
                            // Mettre à jour la progression même via le fallback
                            handleProgressUpdate(data);
                        }
                    }
                } catch (error) {
                    console.error('Erreur fallback check:', error);
                }
            };

            const handleProgressUpdate = function (data) {
                // Gestion spécifique pour la recherche sans téléchargement
                if (data.status === 'completed_find') {
                    if (eventSource) eventSource.close();
                    if (checkInterval) clearInterval(checkInterval);

                    document.getElementById('findBtn').disabled = false;
                    document.getElementById('findBtn').textContent = 'Rechercher';

                    if (data.found) {
                        showStatus('✅ Analyse terminée !', 'success');
                        displayFindResults(data.results || [data]);
                    } else {
                        showStatus(`❌ ${data.message || 'Aucune musique trouvée'}`, 'error');
                    }
                    return;
                }

                if (data.status === 'completed') {
                    console.log('Terminé, affichage du bouton de téléchargement');
                    if (eventSource) eventSource.close();
                    if (checkInterval) clearInterval(checkInterval);

                    const filename = data.filename || (data.is_zip ? 'playlist.zip' : 'musique.mp3');
                    // Ajout du paramètre filename à l'URL
                    const downloadUrl = `/download/${data.file_id}?filename=${encodeURIComponent(filename)}`;

                    const statusMessage = `✅ ${data.message || 'Opération réussie'} !<br><br>`;
                    const downloadLinkHtml = `
                        <a href="${downloadUrl}" download="${filename}" class="download-link"
                           style="display: inline-block; margin-top: 10px; padding: 12px 24px;
                                  background: #667eea; color: white; text-decoration: none;
                                  border-radius: 8px; font-weight: 600; transition: all 0.3s; cursor: pointer;">
                            📥 Télécharger ${data.is_zip ? 'le ZIP' : 'le MP3'}
                        </a>`;

                    const statusDiv = document.getElementById('status');
                    statusDiv.innerHTML = statusMessage + downloadLinkHtml;
                    statusDiv.className = 'status success';
                    statusDiv.style.display = 'block';

                    // Reset buttons
                    if (type === 'convert') {
                        document.getElementById('urlInput').value = '';
                        document.getElementById('fileNameInput').value = '';
                        document.getElementById('convertBtn').disabled = false;
                        document.getElementById('convertBtn').textContent = 'Convertir en MP3';
                    } else {
                        document.getElementById('findBtn').disabled = false;
                        document.getElementById('findBtn').textContent = 'Rechercher';
                        // Afficher aussi les résultats si disponibles
                        if (data.found_info) {
                            displayFindResults(data.found_info.results || [data.found_info]);
                        }
                    }
                } else if (data.status === 'error') {
                    console.log('Erreur détectée:', data.error);
                    if (eventSource) eventSource.close();
                    if (checkInterval) clearInterval(checkInterval);

                    let errorMsg = data.message || data.error || 'Erreur inconnue';
                    if (errorMsg.includes('FFmpeg') && errorMsg.includes('téléchargement')) {
                        errorMsg = '⏳ FFmpeg est en cours de téléchargement automatique. Cela peut prendre quelques minutes. Veuillez réessayer dans quelques instants.';
                        showStatus(errorMsg, 'loading');
                    } else {
                        showStatus(`❌ Erreur: ${errorMsg}`, 'error');
                    }

                    document.getElementById('convertBtn').disabled = false;
                    document.getElementById('convertBtn').textContent = 'Convertir en MP3';
                    document.getElementById('findBtn').disabled = false;
                    document.getElementById('findBtn').textContent = 'Rechercher';

                } else if (['downloading', 'converting', 'analyzing', 'starting'].includes(data.status)) {
                    // Mettre à jour la progression
                    const percent = Math.round(data.percent || 0);
                    let statusText = data.message || 'Traitement en cours...';

                    if (data.status === 'downloading' && percent > 0) {
                        statusText = `${data.message || 'Téléchargement'} (${percent}%)`;
                    }

                    showStatus(statusText, 'loading');
                } else {
                    console.log('Statut inconnu:', data.status, data);
                }
                lastReceivedStatus = data.status;
            };

            eventSource.onmessage = function (event) {
                try {
                    const data = JSON.parse(event.data);
                    // console.log('Données SSE reçues:', data);
                    handleProgressUpdate(data);
                } catch (error) {
                    console.error('Erreur lors du parsing des données SSE:', error, event.data);
                }
            };

            eventSource.onerror = function (error) {
                console.error('Erreur SSE:', error);
                // Ne pas fermer immédiatement, le fallback vérifiera
                if (eventSource.readyState === EventSource.CLOSED) {
                    if (!checkInterval) {
                        checkInterval = setInterval(checkCompletion, 2000);
                    }
                }
            };

            // Démarrer un fallback après 10 secondes
            setTimeout(function () {
                if (lastReceivedStatus !== 'completed' && lastReceivedStatus !== 'error' && lastReceivedStatus !== 'completed_find') {
                    if (!checkInterval) {
                        console.log('Démarrage du fallback de vérification');
                        checkInterval = setInterval(checkCompletion, 2000);
                    }
                }
            }, 10000);
        }

        function displayFindResults(results) {
            const container = document.getElementById('find-results');
            container.innerHTML = '';

            if (!results || results.length === 0) return;

            results.forEach(res => {
                const card = document.createElement('div');
                card.className = 'result-card';

                const coverUrl = res.cover_art || 'https://via.placeholder.com/80?text=No+Cover';

                let linksHtml = '';
                if (res.links) {
                    if (res.links.youtube) linksHtml += `<a href="${res.links.youtube}" target="_blank" class="link-icon" title="YouTube">🎥</a>`;
                    if (res.links.spotify) linksHtml += `<a href="${res.links.spotify}" target="_blank" class="link-icon" title="Spotify">🎧</a>`;
                    if (res.links.soundcloud) linksHtml += `<a href="${res.links.soundcloud}" target="_blank" class="link-icon" title="SoundCloud">☁️</a>`;
                }
                if (res.shazam_url) linksHtml += `<a href="${res.shazam_url}" target="_blank" class="link-icon" title="Shazam">🔵</a>`;

                card.innerHTML = `
                    <img src="${coverUrl}" class="result-cover" alt="Cover">
                    <div class="result-info">
                        <div class="result-title">${res.title}</div>
                        <div class="result-artist">${res.artist}</div>
                        <div class="result-links">${linksHtml}</div>
                    </div>
                    <div class="timecode-badge">${res.formatted_timecode || res.timecode + 's'}</div>
                `;

                container.appendChild(card);
            });
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        // Permettre la conversion avec la touche Entrée
        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') convertUrl();
        });
        document.getElementById('findUrlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') findMusic();
        });
    </script>
</body>

</html>
